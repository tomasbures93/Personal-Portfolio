name: portfolio

services:
  portfolio.api:
    image: ${DOCKER_REGISTRY-}portfolioapi
    container_name: portfolio-api
    build:
      context: ..
      dockerfile: src/Portfolio.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionString: "Host=postgres;Port=5432;Database=Portfolio;Username=appuser;Password=Test123!"
      PortfolioConfig__AdminPassword: "Admin12345!"
      PortfolioConfig__AdminEmail: "Admin@Admin.de"
      PortfolioConfig__AdminUsername: "Adminuser"
    ports: 
      - "12345:8081"

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: Test123!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: my-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: test@test.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5555:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:
  